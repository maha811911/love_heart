<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Heart</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        body {
            margin: 0;
            padding: 0;
            background-color: black; /* خلفية سوداء نفس الصورة */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        // تحديد حجم الكانفاس ليكون بملئ الشاشة
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const words = "I love you";
        const fontSize = 14;
        
        // معادلة رسم القلب الرياضية
        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x, y };
        }

        let angle = 0;

        function draw() {
            // مسح الشاشة تدريجياً لترك أثر (تأثير الحركة)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + "px Arial";
            ctx.fillStyle = "#ff0000"; // لون النص أحمر

            // رسم مجموعة من الكلمات في كل إطار لتشكيل القلب
            for (let i = 0; i < 5; i++) {
                let p = getHeartPoint(angle);
                
                // تحجيم وتوسيط القلب في الشاشة
                let scale = 15; 
                let x = p.x * scale + canvas.width / 2;
                let y = p.y * scale + canvas.height / 2;

                // إضافة دوران للنص ليتبع مسار القلب
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                ctx.fillText(words, 0, 0);
                ctx.restore();

                angle += 0.1; // سرعة رسم القلب
            }

            requestAnimationFrame(draw);
        }

        // إعادة ضبط الحجم عند تغيير حجم النافذة
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        draw();
    </script>
</body>
</html>
