<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>The Coding Wizard Heart</title>
    <style>
        /* إعدادات الخلفية لتكون سوداء بالكامل */
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px; /* يعطي عمق حقيقي للكلمات وهي تلف */
        }

        #ui {
            position: relative;
            transform-style: preserve-3d;
            /* ميلان بسيط للمجموعة كاملة ليعطي شكل القلب */
            transform: rotateX(20deg) rotateZ(10deg);
        }

        /* الكود من صورتك بالضبط */
        .love_word {
            color: #ea80b0;
            font-size: 1.4rem;
            font-family: 'Arial', sans-serif;
            transform: translateY(-100%) rotateZ(-30deg);
            text-shadow: 0 0 10px #fff;
            letter-spacing: 2px;
            white-space: nowrap;
            font-weight: bold;
        }

        .love_horizontal {
            position: absolute;
            transform-style: preserve-3d;
            /* الأنيميشن المذكور في الصورة */
            animation: horizontal 10000ms infinite alternate ease-in-out;
            animation-delay: calc(var(--i) * -300ms); 
        }

        @keyframes horizontal {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* توزيع الكلمات في الفراغ لتشكيل "خاتم" أو "قلب" دوراني */
        .love_horizontal {
            /* كل كلمة تأخذ زاوية مختلفة بناءً على رقمها i */
            transform: rotateY(calc(var(--i) * 12deg)) translateZ(250px);
        }
    </style>
</head>
<body>

<div id="ui">
    <script>
        const ui = document.getElementById('ui');
        const count = 30; // عدد الكلمات
        for (let i = 0; i < count; i++) {
            const container = document.createElement('div');
            container.className = 'love_horizontal';
            container.style.setProperty('--i', i);
            
            const word = document.createElement('div');
            word.className = 'love_word';
            word.innerText = 'I love you';
            
            container.appendChild(word);
            ui.appendChild(container);
        }
    </script>
</div>

</body>
</html>
