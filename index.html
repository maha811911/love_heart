<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Perfect Heart Animation</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>
    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const words = "I love you";
        const numberOfWords = 40; // عدد الكلمات اللي تشكل القلب
        let offset = 0; // هذا المتغير المسؤول عن الحركة

        function getHeartPoint(t) {
            // معادلة القلب الرياضية
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x: x * 15, y: y * 15 }; // 15 هو حجم القلب
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // تنظيف الشاشة في كل فريم
            
            ctx.font = "bold 15px Arial";
            ctx.fillStyle = "#ff0000"; // لون أحمر واضح

            for (let i = 0; i < numberOfWords; i++) {
                // توزيع الكلمات على المسار وإضافة الـ offset للتحريك
                const t = (i / numberOfWords) * Math.PI * 2 + offset;
                const pos = getHeartPoint(t);
                
                const posX = pos.x + canvas.width / 2;
                const posY = pos.y + canvas.height / 2;

                ctx.save();
                ctx.translate(posX, posY);
                // دوران الكلمة لتكون متناسقة مع شكل القلب
                ctx.rotate(t + Math.PI / 2); 
                ctx.fillText(words, 0, 0);
                ctx.restore();
            }

            offset += 0.01; // سرعة دوران الكلمات (0.01 سرعة متوسطة وجميلة)
            requestAnimationFrame(draw);
        }

        draw();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
